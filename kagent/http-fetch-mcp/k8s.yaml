---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-fetch-mcp
  namespace: kagent
  labels:
    app: http-fetch-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-fetch-mcp
  template:
    metadata:
      labels:
        app: http-fetch-mcp
    spec:
      containers:
      - name: http-fetch-mcp
        image: http-fetch-mcp:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8085
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: http-fetch-mcp
  namespace: kagent
spec:
  selector:
    app: http-fetch-mcp
  ports:
  - port: 8085
    targetPort: 8085
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: http-fetch-mcp
  namespace: kagent
spec:
  description: "HTTP Fetch MCP Tool Server"
  url: http://http-fetch-mcp.kagent.svc.cluster.local:8085/mcp
  timeout: 30s
  sseReadTimeout: 5m0s
