alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "webhook-test"
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
    receivers:
      - name: "webhook-test"
        webhook_configs:
          - url: "https://webhook.site/db9c390d-4f07-421c-a3c7-7a6a0043c6d1"
            send_resolved: true
