# ArgoCD Installation für lokale Docker Desktop Plattform
#
# Schritt 1: Offizielle ArgoCD Manifeste installieren
#   kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
#
# Schritt 2: Diese Datei anwenden
#   kubectl apply -f argocd.yaml
#
# Schritt 3: Initial-Passwort auslesen
#   kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
#
# Erreichbar unter: http://argocd.local (User: admin)

---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd

---
# ArgoCD Server im insecure-Modus (TLS wird vom NGINX Ingress übernommen)
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  server.insecure: "true"

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
